[pytest]
# Keep pytest focused on the primary project root and avoid collecting
# duplicate nested copies, caches and scratch test helpers.
testpaths = .
norecursedirs =
    .git
    .venv
    venv
    env
    __pycache__
    .pytest_cache
    # Exclude top-level duplicate workspace folders and nested copies
    project 1
    project 1/*
    "project 1"
    "project 1/*"
    "project 1/project 1"
    "project 1/project 1/*"
    # Exclude developer scratch and helper folders
    scratch
    scratch/*
    project\ 1/scratch
    "project 1/scratch"

# Only collect files that follow the project's test naming convention.
python_files = test_*.py *_test.py
