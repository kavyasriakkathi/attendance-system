services:
  - type: web
    name: attendance-system
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn wsgi:app --workers 1 --timeout 120
    envVars:
      - key: DATABASE_URL
        sync: false          # Paste your Neon connection string in the Render dashboard
      - key: SECRET_KEY
        generateValue: true
      - key: MAIL_USERNAME
        sync: false
      - key: MAIL_PASSWORD
        sync: false
      - key: MAIL_SERVER
        value: smtp.gmail.com
      - key: MAIL_PORT
        value: "587"
      - key: MAIL_USE_TLS
        value: "True"
      - key: PYTHON_VERSION
        value: 3.11.10
      - key: NEON_DB
        value: "true"        # Signals the app is using Neon PostgreSQL

# No built-in database — using Neon (https://neon.tech) free PostgreSQL
