{% extends "layout.html" %}
{% block content %}
<div class="login-wrapper">
    <div class="card login-card">
        <div class="login-header">
            <i class="fa-solid fa-user-shield login-icon"></i>
            <h1>Admin Login</h1>
            <p class="muted">Access the management console</p>
        </div>

        <form method="post" class="login-form">
            <div class="form-group">
                <label for="username">Username</label>
                <input id="username" type="text" name="username" required autofocus placeholder="Enter admin username" />
            </div>

            <div class="form-group">
                <label for="password">Password</label>
                <input id="password" type="password" name="password" required placeholder="••••••••" />
            </div>

            <button type="submit" class="primary-btn">
                Sign In <i class="fa-solid fa-right-to-bracket"></i>
            </button>
        </form>
    </div>
</div>
{% endblock %}
