{% extends "layout.html" %}
{% block content %}
<div class="card">
    <h1>Students</h1>
    <form method="post" class="form-row">
        <div>
            <label>Name</label>
            <input type="text" name="name" required />
        </div>
        <div>
            <label>Enrollment</label>
            <input type="text" name="enrollment" required />
        </div>
        <div>
            <label>Email</label>
            <input type="email" name="email" />
        </div>
        <div>
            <label>Branch</label>
            <select name="branch_id" required>
                <option value="">Choose branch</option>
                {% for branch in branches %}
                <option value="{{ branch.id }}">{{ branch.name }}</option>
                {% endfor %}
            </select>
        </div>
        <button type="submit">Add Student</button>
    </form>
</div>
<div class="card">
    <h2 style="margin-bottom: 20px;"><i class="fa-solid fa-magnifying-glass"></i> Search & Filter Students</h2>
    <form method="get" class="form-row">
        <div>
            <label>Search</label>
            <input type="text" name="search" placeholder="Name or Enrollment..." value="{{ search }}" />
        </div>
        <div>
            <label>Branch</label>
            <select name="branch_id">
                <option value="">All Branches</option>
                {% for branch in branches %}
                <option value="{{ branch.id }}" {% if selected_branch_id and branch.id|string == selected_branch_id|string %}selected{% endif %}>{{ branch.name }}</option>
                {% endfor %}
            </select>
        </div>
        <div style="display: flex; gap: 10px; align-items: flex-end;">
            <button type="submit">Search</button>
            <a href="{{ url_for('students') }}" class="button" style="background-color: var(--text-secondary);">Clear</a>
        </div>
    </form>
</div>
<div class="card">
    <table>
        <thead>
            <tr>
                <th>Name</th>
                <th>Enrollment</th>
                <th>Email</th>
                <th>Branch</th>
                <th>Action</th>
            </tr>
        </thead>
        <tbody>
            {% for student in students %}
            <tr>
                <td>{{ student.name }}</td>
                <td>{{ student.enrollment }}</td>
                <td>{{ student.email or '-' }}</td>
                <td>{{ student.branch_name }}</td>
                <td><a href="{{ url_for('student_dashboard_by_id', student_id=student.id) }}">View</a></td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
</div>
{% endblock %}
