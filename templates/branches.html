{% extends "layout.html" %}
{% block content %}
<div class="card">
    <h1>Branches</h1>
    <form method="post" class="form-row">
        <div>
            <label>Name</label>
            <input type="text" name="name" required />
        </div>
        <div>
            <label>Location</label>
            <input type="text" name="location" />
        </div>
        <button type="submit">Add Branch</button>
    </form>
</div>
<div class="card">
    <table>
        <thead>
            <tr>
                <th>Name</th>
                <th>Location</th>
            </tr>
        </thead>
        <tbody>
            {% for branch in branches %}
            <tr>
                <td>{{ branch.name }}</td>
                <td>{{ branch.location or '-' }}</td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
</div>
{% endblock %}
