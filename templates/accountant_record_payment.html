{% extends "layout.html" %}
{% block head %}
<title>Record Payment - Accountant Desk</title>
<style>
  .card-box {
    background: #ffffff;
    border-radius: 12px;
    padding: 1.5rem;
    box-shadow: 0 4px 15px rgba(0, 0, 0, 0.05);
    max-width: 750px;
    margin: 0 auto;
  }
  .form-group { display: flex; flex-direction: column; gap: 0.4rem; margin-bottom: 1.25rem; }
  .form-group label { font-size: 0.85rem; font-weight: 600; color: #334155; }
  .form-control { padding: 0.65rem 0.8rem; border: 1px solid #cbd5e1; border-radius: 8px; font-size: 0.95rem; }
</style>
{% endblock %}

{% block content %}
<div class="container-fluid" style="max-width: 1200px; margin: 0 auto; padding: 1.5rem 1rem;">
  <div style="margin-bottom: 1.5rem; text-align: center;">
    <a href="{{ url_for('accountant_dashboard') }}" style="color:#2563eb; text-decoration:none; font-weight:600;"><i class="fa-solid fa-arrow-left"></i> Back to Desk</a>
    <h2 style="margin:0.5rem 0 0 0; color:#0f172a; font-weight:800;"><i class="fa-solid fa-hand-holding-dollar" style="color:#10b981;"></i> Record Student Fee Payment</h2>
    <p style="margin:0.25rem 0 0 0; color:#64748b; font-size:0.95rem;">Select student pending fee and issue official receipt</p>
  </div>

  <div class="card-box">
    <!-- Student filter search -->
    <form action="{{ url_for('accountant_record_payment') }}" method="GET" style="display:flex; gap:0.5rem; margin-bottom:1.5rem;">
      <input type="text" name="q" class="form-control" style="flex:1;" placeholder="Search student by name or enrollment #" value="{{ search_q }}">
      <button type="submit" class="btn" style="background:#2563eb; color:#fff; padding:0.6rem 1.2rem; border:none; border-radius:8px; font-weight:600; cursor:pointer;">Search</button>
    </form>

    <form action="{{ url_for('accountant_record_payment') }}" method="POST">
      <div class="form-group">
        <label>Select Pending Fee Assignment *</label>
        <select name="assignment_id" class="form-control" required>
          <option value="">-- Choose Pending Student Fee --</option>
          {% for a in assignments %}
            <option value="{{ a.assignment_id }}" {% if selected_assignment_id == a.assignment_id %}selected{% endif %}>
              {{ a.student_name }} ({{ a.enrollment }}) – {{ a.fee_name }} – Semester {{ a.semester or 1 }} – ₹{{ "{:,.2f}".format(a.net_amount) }} – Pending ₹{{ "{:,.2f}".format(a.pending_amount) }}
            </option>
          {% endfor %}
        </select>
      </div>

      <div class="form-group">
        <label>Amount Paid (₹) *</label>
        <input type="number" step="0.01" name="amount_paid" class="form-control" placeholder="e.g. 25000.00" required>
      </div>

      <div class="form-group">
        <label>Payment Date *</label>
        <input type="date" name="payment_date" class="form-control" value="{{ today_date }}" required>
      </div>

      <div class="form-group">
        <label>Payment Mode *</label>
        <select name="payment_mode" class="form-control" required>
          <option value="Cash">Cash</option>
          <option value="UPI">UPI / QR (GPay / PhonePe / Paytm)</option>
          <option value="Online">Online / NetBanking</option>
          <option value="Bank Transfer">Bank Transfer (NEFT/RTGS/IMPS)</option>
          <option value="Cheque">Cheque / Demand Draft</option>
        </select>
      </div>

      <div class="form-group">
        <label>Transaction / Reference ID / Cheque #</label>
        <input type="text" name="transaction_id" class="form-control" placeholder="Auto-generated if left blank">
      </div>

      <div class="form-group">
        <label>Notes / Comments</label>
        <input type="text" name="notes" class="form-control" placeholder="Optional notes...">
      </div>

      <div style="margin-top: 1.5rem;">
        <button type="submit" class="btn" style="width:100%; background:#10b981; color:#fff; padding:0.75rem; border:none; border-radius:8px; font-weight:700; font-size:1rem; cursor:pointer;">
          <i class="fa-solid fa-receipt"></i> Submit & Print Official Receipt
        </button>
      </div>
    </form>
  </div>
</div>
{% endblock %}
