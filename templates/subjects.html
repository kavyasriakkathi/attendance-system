{% extends "layout.html" %}
{% block content %}
<div class="card">
    <h1>Subjects</h1>
    <form method="post" class="form-row">
        <div>
            <label>Name</label>
            <input type="text" name="name" required />
        </div>
        <div>
            <label>Branch</label>
            <select name="branch_id" required>
                <option value="">Choose branch</option>
                {% for branch in branches %}
                <option value="{{ branch.id }}">{{ branch.name }}</option>
                {% endfor %}
            </select>
        </div>
        <button type="submit">Add Subject</button>
    </form>
</div>
<div class="card">
    <table>
        <thead>
            <tr>
                <th>Subject</th>
                <th>Branch</th>
                <th>Action</th>
            </tr>
        </thead>
        <tbody>
            {% for subject in subjects %}
            <tr>
                <td>{{ subject.name }}</td>
                <td>{{ subject.branch_name }}</td>
                <td>
                    <form method="post" action="{{ url_for('delete_subject') }}" onsubmit="return confirm('Are you sure you want to delete this subject?');" style="display:inline;">
                        <input type="hidden" name="subject_id" value="{{ subject.id }}" />
                        <button type="submit" class="button" style="background:#ef4444;color:white;border:0;padding:5px 10px;border-radius:4px;cursor:pointer;">Delete</button>
                    </form>
                </td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
</div>
{% endblock %}
