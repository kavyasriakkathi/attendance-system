{% extends "layout.html" %}

{% block content %}
<div style="max-width: 520px; margin: 30px auto; padding: 0 15px;">
    <div class="card" style="background: white; border-radius: 20px; padding: 36px 30px; box-shadow: 0 10px 30px rgba(0,0,0,0.08); border: 1px solid #e2e8f0;">
        <div style="text-align: center; margin-bottom: 24px;">
            <div style="width: 64px; height: 64px; border-radius: 50%; background: linear-gradient(135deg, #059669, #0284c7); color: white; display: flex; align-items: center; justify-content: center; font-size: 1.8rem; margin: 0 auto 12px auto; box-shadow: 0 6px 16px rgba(5, 150, 105, 0.3);">
                <i class="fa-solid fa-user-plus"></i>
            </div>
            <h2 style="font-size: 1.6rem; font-weight: 800; color: #0f172a; margin-bottom: 4px;">Register Parent Account</h2>
            <p style="color: #64748b; font-size: 0.9rem; margin: 0;">Link your parent account with your student's roll number.</p>
        </div>

        <form method="POST" action="{{ url_for('parent_register') }}">
            <div style="margin-bottom: 16px;">
                <label style="display: block; font-weight: 700; font-size: 0.85rem; color: #334155; margin-bottom: 6px;">
                    Parent Full Name *
                </label>
                <input type="text" name="name" placeholder="e.g. Robert Smith" required style="width: 100%; padding: 11px 14px; border-radius: 10px; border: 1px solid #cbd5e1; font-size: 0.95rem; box-sizing: border-box;">
            </div>

            <div style="margin-bottom: 16px;">
                <label style="display: block; font-weight: 700; font-size: 0.85rem; color: #334155; margin-bottom: 6px;">
                    Student Roll Number / Enrollment ID *
                </label>
                <input type="text" name="enrollment" placeholder="e.g. 21CSM001" required style="width: 100%; padding: 11px 14px; border-radius: 10px; border: 1px solid #cbd5e1; font-size: 0.95rem; box-sizing: border-box; text-transform: uppercase;">
                <small style="color: #64748b; font-size: 0.8rem;">Must match your ward's registered roll number in college records.</small>
            </div>

            <div style="margin-bottom: 16px;">
                <label style="display: block; font-weight: 700; font-size: 0.85rem; color: #334155; margin-bottom: 6px;">
                    Parent Username *
                </label>
                <input type="text" name="username" placeholder="Choose a unique username" required style="width: 100%; padding: 11px 14px; border-radius: 10px; border: 1px solid #cbd5e1; font-size: 0.95rem; box-sizing: border-box;">
            </div>

            <div style="margin-bottom: 16px;">
                <label style="display: block; font-weight: 700; font-size: 0.85rem; color: #334155; margin-bottom: 6px;">
                    Password *
                </label>
                <input type="password" name="password" placeholder="Create a strong password" required style="width: 100%; padding: 11px 14px; border-radius: 10px; border: 1px solid #cbd5e1; font-size: 0.95rem; box-sizing: border-box;">
            </div>

            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 14px; margin-bottom: 24px;">
                <div>
                    <label style="display: block; font-weight: 700; font-size: 0.85rem; color: #334155; margin-bottom: 6px;">Phone</label>
                    <input type="text" name="phone" placeholder="e.g. +91 9876543210" style="width: 100%; padding: 11px 14px; border-radius: 10px; border: 1px solid #cbd5e1; font-size: 0.9rem; box-sizing: border-box;">
                </div>
                <div>
                    <label style="display: block; font-weight: 700; font-size: 0.85rem; color: #334155; margin-bottom: 6px;">Email</label>
                    <input type="email" name="email" placeholder="parent@example.com" style="width: 100%; padding: 11px 14px; border-radius: 10px; border: 1px solid #cbd5e1; font-size: 0.9rem; box-sizing: border-box;">
                </div>
            </div>

            <button type="submit" style="width: 100%; padding: 13px; background: linear-gradient(135deg, #059669, #0284c7); color: white; border: none; border-radius: 12px; font-weight: 800; font-size: 1.05rem; cursor: pointer; transition: all 0.2s; box-shadow: 0 4px 14px rgba(5, 150, 105, 0.3);">
                <i class="fa-solid fa-user-check" style="margin-right: 8px;"></i> Create & Link Parent Account
            </button>
        </form>

        <div style="margin-top: 20px; text-align: center; border-top: 1px solid #f1f5f9; padding-top: 16px; font-size: 0.9rem; color: #64748b;">
            Already have an account? 
            <a href="{{ url_for('parent_login') }}" style="color: #0284c7; font-weight: 700; text-decoration: none;">Sign In Here</a>
        </div>
    </div>
</div>
{% endblock %}
