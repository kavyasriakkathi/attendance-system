{% extends "layout.html" %}
{% block content %}
<div class="card login-card" style="max-width: 500px; margin: 60px auto; padding: 40px; border-top: 6px solid #06d6a0;">
    <div style="text-align: center; margin-bottom: 30px;">
        <i class="fa-solid fa-chalkboard-user" style="font-size: 3.5rem; color: #06d6a0; margin-bottom: 20px;"></i>
        <h1 style="margin: 0;">Teacher Portal</h1>
        <p style="color: var(--text-secondary);">Manage your classes and attendance</p>
    </div>

    <form method="POST">
        <div>
            <label><i class="fa-solid fa-user-tie"></i> Username</label>
            <input type="text" name="username" required placeholder="Enter your teacher ID" />
        </div>
        <div>
            <label><i class="fa-solid fa-key"></i> Password</label>
            <input type="password" name="password" required placeholder="••••••••" />
        </div>
        <button type="submit" style="width: 100%; background-color: #06d6a0; margin-top: 10px;">
            Enter Dashboard <i class="fa-solid fa-arrow-right"></i>
        </button>
    </form>

    <div style="margin-top: 30px; padding: 20px; background: #f0faf7; border-radius: 16px;">
        <h3 style="font-size: 0.9rem; color: #0b6e54; margin-bottom: 12px; text-transform: uppercase; letter-spacing: 1px;">Capabilities</h3>
        <ul style="margin: 0; padding: 0; list-style: none; font-size: 0.9rem; color: #1a6a3f; display: grid; gap: 8px;">
            <li><i class="fa-solid fa-check" style="color: #06d6a0;"></i> Mark daily attendance</li>
            <li><i class="fa-solid fa-check" style="color: #06d6a0;"></i> View class performance</li>
            <li><i class="fa-solid fa-check" style="color: #06d6a0;"></i> Export subject reports</li>
        </ul>
    </div>

    <div style="text-align: center; margin-top: 24px;">
        <a href="{{ url_for('index') }}" style="text-decoration: none; font-weight: 600; color: var(--text-secondary);">
            <i class="fa-solid fa-chevron-left"></i> Back to Home
        </a>
    </div>
</div>
{% endblock %}
